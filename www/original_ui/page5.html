<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Count by Country</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Feature 5 title -->
    <h2>Count Universities by Country</h2>
    <!-- Country input box -->
    <textarea id="countryCountInput" class="input-box" placeholder="Enter Region (Must be full name of the region,e.g. United States)"></textarea>
    <!-- Count button -->
    <button class="action-btn" id="countCountryBtn">Count Universities</button>
    <!-- Count result display area (highlight number) -->
    <div id="countryCountResult"></div>
    <!-- Back to home page button -->
    <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>
  </div>
  <!-- Load global data first, then feature 5 logic -->
  <script src="js/app.js"></script>
  <script src="js/page5.js"></script>
</body>
</html>
