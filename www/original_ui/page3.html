<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search University by Name</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Feature 3 title -->
    <h2>Search University by Name</h2>
    <!-- Search input box -->
    <textarea id="nameSearchInput" class="input-box" placeholder="Enter university name (e.g., City University of Hong Kong)"></textarea>
    <!-- Search button -->
    <button class="action-btn" id="nameSearchBtn">Search</button>
    <!-- Search result display area -->
    <div id="nameSearchResult"></div>
    <!-- Back to home page button -->
    <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>
  </div>
  <!-- Load global data first, then feature 3 logic -->
  <script src="js/app.js"></script>
  <script src="js/page3.js"></script>
</body>
</html>
