<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School App - Login/Register</title>
    <style>
        /* Keep original UI styles, add login/register panel */
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .auth-tab {
            display: flex;
            margin-bottom: 20px;
        }
        .auth-tab button {
            flex: 1;
            padding: 10px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
        }
        .auth-tab button.active {
            background: #007bff;
            color: white;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .error-msg {
            color: red;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- Login/Register Panel (Initial Page) -->
    <div class="auth-container">
        <button onclick="openOriginalUI()">Using significant Features without Login or Register</button>
        <h2>School Application</h2>
        <div class="auth-tab">
            <button id="loginTab" class="active">Login</button>
            <button id="registerTab">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
            <div class="error-msg" id="loginError"></div>
            <input type="text" id="loginUsername" placeholder="Username" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form">
            <div class="error-msg" id="registerError"></div>
            <input type="text" id="registerUsername" placeholder="Username" required>
            <input type="password" id="registerPassword" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
    </div>

    <!-- Include Cordova JS and DB Logic -->
    <script src="cordova.js"></script>
    <script src="db.js"></script>
    <script>
        /**
         * Auth page logic (login/register tab switch + form submission)
         */
        document.addEventListener("DOMContentLoaded", function() {
            // Tab switch logic
            const loginTab = document.getElementById("loginTab");
            const registerTab = document.getElementById("registerTab");
            const loginForm = document.getElementById("loginForm");
            const registerForm = document.getElementById("registerForm");
            const loginError = document.getElementById("loginError");
            const registerError = document.getElementById("registerError");

            // Check if user is already logged in (redirect to main UI)
            if (localStorage.getItem("loggedIn") === "true") {
                window.location.href = "main.html"; // Main UI page (original app)
                return;
            }

            // Switch to login tab
            loginTab.addEventListener("click", function() {
                loginTab.classList.add("active");
                registerTab.classList.remove("active");
                loginForm.classList.add("active");
                registerForm.classList.remove("active");
                loginError.textContent = "";
                registerError.textContent = "";
            });

            // Switch to register tab
            registerTab.addEventListener("click", function() {
                registerTab.classList.add("active");
                loginTab.classList.remove("active");
                registerForm.classList.add("active");
                loginForm.classList.remove("active");
                loginError.textContent = "";
                registerError.textContent = "";
            });

            // Login form submission
            loginForm.addEventListener("submit", async function(e) {
                e.preventDefault();
                const username = document.getElementById("loginUsername").value.trim();
                const password = document.getElementById("loginPassword").value.trim();
                loginError.textContent = "";

                try {
                    const message = await loginUser(username, password);
                    alert(message);
                    window.location.href = "main.html"; // Redirect to main UI
                } catch (error) {
                    loginError.textContent = error;
                }
            });

            // Register form submission
            registerForm.addEventListener("submit", async function(e) {
                e.preventDefault();
                const username = document.getElementById("registerUsername").value.trim();
                const password = document.getElementById("registerPassword").value.trim();
                registerError.textContent = "";

                try {
                    const message = await registerUser(username, password);
                    alert(message);
                    // Switch back to login tab after success
                    loginTab.click();
                    document.getElementById("loginUsername").value = username;
                    document.getElementById("loginPassword").value = "";
                } catch (error) {
                    registerError.textContent = error;
                }
            });
        });
    </script>
    

<script>

function openOriginalUI() {
    window.location.href = 'original_ui/index.html';
}
</script>

</body>
</html>
